version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: depart_postgres
    environment:
      POSTGRES_DB: depart
      POSTGRES_USER: depart_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-depart_secure_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U depart_user -d depart"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - depart_network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: depart_api
    environment:
      DATABASE_URL: postgresql://depart_user:${DB_PASSWORD:-depart_secure_password}@postgres:5432/depart
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - depart_network
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: depart_web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    networks:
      - depart_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  depart_network:
    driver: bridge
